name: Publish Package on NPM

on:
  push:
    branches: ['main']
  workflow_dispatch:
  
jobs:
  prebuild:
    permissions:
      contents: read
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          submodules: 'recursive'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libgtk-3-dev pkg-config

      - name: Install macOS dependencies
        if: matrix.os == 'macos-latest'
        run: brew install gtk+3 pkgconfig

      - name: Install Dependencies
        run: npm install --ignore-scripts

      - name: Create prebuild
        run: npm run prebuild

      - name: Upload prebuild artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.os }}
          path: prebuilds

  publish:
    runs-on: ubuntu-latest
    needs: prebuild
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          submodules: 'recursive'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Download prebuild artifacts
        uses: actions/download-artifact@v4
        with:
          path: prebuilds
          merge-multiple: true

      - uses: JS-DevTools/npm-publish@v4
